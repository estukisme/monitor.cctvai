<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<title>AI CCTV SYSTEM MONITORING</title>

<style>

body{
background:#070e1f;
font-family:Segoe UI;
color:white;
margin:0;
}

.header{
background:#111c3a;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.time{
text-align:center;
padding:10px;
color:#8ea3ff;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding:30px;
}

.card{
background:#151f3e;
border-radius:14px;
padding:25px;
font-size:18px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.status{
margin-top:12px;
font-size:16px;
}

.online{
color:#00ff88;
}

.offline{
color:#ff4040;
}

.metric{
margin-top:10px;
color:#bfc7ff;
}

</style>

</head>

<body>

<div class="header">
AI CCTV SYSTEM MONITORING
</div>

<div class="time" id="time">
Loading...
</div>

<div class="grid">

<div class="card">
Starlink
<div id="Starlink" class="status"></div>
</div>

<div class="card">
Router Utama
<div id="RouterUtama" class="status"></div>
</div>

<div class="card">
Router CCTV
<div id="RouterCCTV" class="status"></div>
</div>

<div class="card">
CCTV Camera
<div id="CCTV" class="status"></div>
</div>

<div class="card">
AI Detection
<div id="AI" class="status"></div>
</div>

<div class="card">
GPU RTX 4070 Ti
<div class="metric" id="gpu_usage"></div>
<div class="metric" id="gpu_mem"></div>
<div class="metric" id="gpu_temp"></div>
</div>

</div>

<script>

function indicator(id,state){

let el = document.getElementById(id)

if(!el) return

if(state){

el.innerHTML = '<span class="online">● ONLINE</span>'

}else{

el.innerHTML = '<span class="offline">● OFFLINE</span>'

}

}

async function load(){

try{

let r = await fetch("/status")

let d = await r.json()

indicator("Starlink", d.Starlink)
indicator("RouterUtama", d.RouterUtama)
indicator("RouterCCTV", d.RouterCCTV)
indicator("CCTV", d.CCTV)
indicator("AI", d.AI)

document.getElementById("gpu_usage").innerHTML = "Usage : " + d.GPU.usage
document.getElementById("gpu_mem").innerHTML = "VRAM : " + d.GPU.memory
document.getElementById("gpu_temp").innerHTML = "Temp : " + d.GPU.temp

document.getElementById("time").innerHTML = "Last Update : " + d.time

}catch(e){

document.getElementById("time").innerHTML = "Server not reachable"

}

}

setInterval(load,2000)

load()

</script>

</body>
</html>
